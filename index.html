     6) js/data.js (Seed/Domaene/Migration an window.KS)
     7) js/charts.js (Chart-/Plate-Funktionen an window.KS)
     8) js/live.js (Live-Session/Timer/Audio an window.KS)
     9) js/app.js (definiert window.KS-Helfer, ruft beim Init render + KSSync auf) -->
